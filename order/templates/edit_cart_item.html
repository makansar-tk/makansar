{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="bg-[#e8e8ed] font-sans pt-20">
    <div class="max-w-4xl mx-auto p-4">
        <h1 class="text-lg font-bold text-gray-800 mb-2">Edit Cart Item</h1>
        <div class="bg-white rounded-lg shadow p-4">
            <form method="post">
                {% csrf_token %}
                <label for="quantity" class="block text-gray-700 text-sm font-bold mb-2">Quantity:</label>
                <input type="number" id="quantity" name="quantity" value="{{ cart_item.quantity }}" min="1" class="shadow appearance-none border rounded py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                <button type="submit" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">Update Quantity</button>
            </form>
            {% if cart_item %}
            <form method="post" action="{% url 'order:delete_cart_item' cart_item.id %}" class="mt-4">
                {% csrf_token %}
                <button type="submit" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600" onclick="return confirm('Are you sure you want to delete this item?');">Delete Item</button>
            </form>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
