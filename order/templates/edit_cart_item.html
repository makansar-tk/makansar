{% extends 'base.html' %}

{% block content %}
<h1>Edit Cart Item</h1>
<form method="post">
    {% csrf_token %}
    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" name="quantity" value="{{ cart_item.quantity }}" min="1">
    <button type="submit">Update Quantity</button>
</form>
{% if cart_item %}
    <form method="post" action="{% url 'order:delete_cart_item' cart_item.id %}">
        {% csrf_token %}
        <button type="submit" onclick="return confirm('Are you sure you want to delete this item?');">Delete Item</button>
    </form>
{% endif %}
{% endblock %}
