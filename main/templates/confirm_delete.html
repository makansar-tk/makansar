{% extends 'base.html' %}
{% block meta %}
<title>Delete Account</title>
{% endblock meta %}

{% block content %}
<div class="container">
    <h2>Confirm Account Deletion</h2>
    <p>Are you sure you want to delete your account? This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" name="action" value="confirm_delete">Yes</button>
        <button type="submit" name="action" value="cancel_delete">No</button>
    </form>
</div>
{% endblock %}
