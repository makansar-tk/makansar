<h2>Reviews for {{ food_item.name }}</h2>
{% for review in reviews %}
    <div>
        <strong>{{ review.buyer.username }}</strong> ({{ review.date_created|date:"Y-m-d" }})
        <p>Rating: {{ review.rating }} / 5</p>
        <p>{{ review.comment }}</p>
    </div>
{% empty %}
    <p>Belum ada review untuk produk ini.</p>
{% endfor %}
